joy_node:
  ros__parameters:
    dev: /dev/input/js0
    deadzone: 0.08
    autorepeat_rate: 2.0
    sticky_buttons: false
    coalesce_interval: 0.01

joystick_node:
  ros__parameters:
    linear_axis: 1
    angular_axis: 0
    linear_axis_sign: 1.0
    angular_axis_sign: 1.0
    linear_scale: 0.8
    angular_scale: 1.2
    deadzone: 0.03
    full_scale_threshold: 0.9
    deadman_button: -1
    stop_button: 1
    stand_button: 2
    sit_button: 3
    publish_zero_when_inactive: true

manual_controller_node:
  ros__parameters:
    deadman_button: -1
    stop_button: 1
    forward_button: 12
    backward_button: 13
    left_button: 14
    right_button: 15
    stand_button: 2
    sit_button: 3
    axis_deadzone: 0.03
    control_period: 0.5
