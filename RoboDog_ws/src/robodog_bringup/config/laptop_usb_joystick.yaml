joy_node:
  ros__parameters:
    dev: /dev/input/js0
    deadzone: 0.05
    autorepeat_rate: 1.0
    sticky_buttons: false
    coalesce_interval: 0.005

joystick_node:
  ros__parameters:
    linear_axis: 1
    angular_axis: 0
    linear_axis_sign: 1.0
    angular_axis_sign: 1.0
    linear_scale: 0.6
    angular_scale: 1.0
    deadzone: 0.12
    deadman_button: 4
    stop_button: 1
    stand_button: 2
    sit_button: 3
    publish_zero_when_inactive: true

manual_controller_node:
  ros__parameters:
    deadman_button: 4
    stop_button: 1
    forward_button: 12
    backward_button: 13
    left_button: 14
    right_button: 15
    stand_button: 2
    sit_button: 3
    axis_deadzone: 0.12
